<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cole</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:wght@300;400&display=swap');

        body {
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            background: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        .browser-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            background: linear-gradient(180deg, #000 0%, #0a0a0a 100%);
            padding: 20px 30px;
            border-bottom: 1px solid #1a1a1a;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.8);
        }

        .title {
            text-align: center;
            font-size: 32px;
            color: #fff;
            font-weight: 600;
            letter-spacing: 8px;
            margin-bottom: 20px;
            font-family: 'Cinzel', serif;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }

        .search-container {
            display: flex;
            gap: 0;
            max-width: 800px;
            margin: 0 auto;
        }

        .search-input {
            flex: 1;
            padding: 14px 24px;
            background: #000;
            border: 1px solid #2a2a2a;
            border-right: none;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Cormorant Garamond', serif;
            letter-spacing: 0.5px;
        }

        .search-input:focus {
            border-color: #3a3a3a;
            background: #050505;
            box-shadow: inset 0 1px 10px rgba(0, 0, 0, 0.5);
        }

        .search-input::placeholder {
            color: #3a3a3a;
            font-style: italic;
        }

        .button {
            padding: 14px 32px;
            background: #000;
            border: 1px solid #2a2a2a;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cinzel', serif;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .button:hover {
            background: #0a0a0a;
            border-color: #3a3a3a;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
        }

        .button:active {
            background: #1a1a1a;
        }

        .nav-bar {
            display: flex;
            justify-content: center;
            padding: 12px 30px;
            background: #000;
            border-bottom: 1px solid #1a1a1a;
        }

        .url-display {
            max-width: 800px;
            padding: 8px 24px;
            background: transparent;
            border: 1px solid #1a1a1a;
            color: #3a3a3a;
            font-size: 12px;
            font-family: 'Cormorant Garamond', serif;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            text-align: center;
            letter-spacing: 1px;
        }











        .iframe-container {
            flex: 1;
            background: #000;
            position: relative;
            overflow: hidden;
        }

        .browser-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 2px solid #1a1a1a;
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }



        .home-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            flex-direction: column;
            background: #000;
        }

        .home-screen h1 {
            font-size: 96px;
            font-weight: 600;
            letter-spacing: 16px;
            margin-bottom: 30px;
            font-family: 'Cinzel', serif;
            text-shadow: 0 0 50px rgba(255, 255, 255, 0.1);
        }

        .home-screen p {
            font-size: 16px;
            color: #3a3a3a;
            letter-spacing: 3px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="browser-container">
        <div class="header">
            <div class="title">C O L E</div>
            <div class="search-container">
                <input type="text" 
                       class="search-input" 
                       id="searchInput" 
                       placeholder="Enter destination..."
                       autocomplete="off">
                <button class="button" id="searchBtn">Enter</button>
            </div>
        </div>

        <div class="nav-bar">
            <div class="url-display" id="urlDisplay">—</div>
        </div>

        <div class="iframe-container">
            <div class="loading-overlay hidden" id="loadingOverlay">
                <div class="loading-spinner"></div>
            </div>
            <div class="home-screen" id="homeScreen">
                <h1>C O L E</h1>
                <p>A Gateway to the Web</p>
            </div>
            <iframe class="browser-frame hidden" 
                    id="browserFrame"
                    sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-modals allow-popups-to-escape-sandbox"
                    src="about:blank">
            </iframe>
        </div>
    </div>

    <script>
        // Inline minimal proxy handler
        const USE_DIRECT = true; // Load sites directly
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const browserFrame = document.getElementById('browserFrame');
        const homeScreen = document.getElementById('homeScreen');
        const urlDisplay = document.getElementById('urlDisplay');
        const loadingOverlay = document.getElementById('loadingOverlay');

        let history = [];
        let currentIndex = -1;

        function isValidUrl(string) {
            try {
                const url = new URL(string);
                return url.protocol === 'http:' || url.protocol === 'https:';
            } catch (_) {
                return false;
            }
        }

        function formatUrl(input) {
            if (isValidUrl(input)) {
                return input;
            }
            
            // Check if it looks like a domain
            if (input.includes('.') && !input.includes(' ')) {
                return 'https://' + input;
            }
            
            // Otherwise treat as search query
            return 'https://duckduckgo.com/?q=' + encodeURIComponent(input);
        }

        async function navigateTo(url) {
            const targetUrl = formatUrl(url);
            
            // Add to history
            if (currentIndex < history.length - 1) {
                history = history.slice(0, currentIndex + 1);
            }
            history.push(targetUrl);
            currentIndex = history.length - 1;

            // Show loading
            loadingOverlay.classList.remove('hidden');
            homeScreen.classList.add('hidden');
            browserFrame.classList.remove('hidden');

            // Load URL directly
            browserFrame.src = targetUrl;
            
            // Update URL display with cleaner format
            try {
                const urlObj = new URL(targetUrl);
                urlDisplay.textContent = urlObj.hostname.replace('www.', '');
            } catch (e) {
                urlDisplay.textContent = targetUrl;
            }
        }

        function loadHomePage() {
            history = [];
            currentIndex = -1;
            homeScreen.classList.remove('hidden');
            browserFrame.classList.add('hidden');
            browserFrame.src = 'about:blank';
            urlDisplay.textContent = '—';
            loadingOverlay.classList.add('hidden');
        }



        // Event listeners
        searchBtn.addEventListener('click', () => {
            const query = searchInput.value.trim();
            if (query) {
                navigateTo(query);
            }
        });

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value.trim();
                if (query) {
                    navigateTo(query);
                }
            }
        });

        // Double-click title to go home
        document.querySelector('.title').addEventListener('dblclick', () => {
            searchInput.value = '';
            loadHomePage();
        });







        // ESC key to go home
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                searchInput.value = '';
                loadHomePage();
            }
        });

        // Hide loading overlay when iframe loads
        browserFrame.addEventListener('load', () => {
            loadingOverlay.classList.add('hidden');
        });

        // Initialize
        loadHomePage();
    </script>
</body>
</html>
