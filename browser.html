<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cole</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        .browser-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            background: #000;
            padding: 15px;
            border-bottom: 1px solid #222;
        }

        .title {
            text-align: center;
            font-size: 18px;
            color: #fff;
            font-weight: 500;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .search-container {
            display: flex;
            gap: 10px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .search-input {
            flex: 1;
            padding: 10px 15px;
            background: #111;
            border: 1px solid #333;
            border-radius: 4px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: #555;
        }

        .search-input::placeholder {
            color: #555;
        }

        .button {
            padding: 10px 20px;
            background: #111;
            border: 1px solid #333;
            border-radius: 4px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .button:hover {
            background: #222;
        }

        .button:active {
            background: #333;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
            padding: 10px 15px;
            background: #000;
            border-bottom: 1px solid #222;
        }

        .nav-btn {
            padding: 6px 12px;
            background: #111;
            border: 1px solid #333;
            border-radius: 4px;
            color: #fff;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 13px;
        }

        .nav-btn:hover {
            background: #222;
        }

        .quick-links {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .quick-link {
            padding: 6px 12px;
            background: #111;
            border: 1px solid #333;
            border-radius: 4px;
            color: #fff;
            text-decoration: none;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
            display: inline-block;
        }

        .quick-link:hover {
            background: #222;
        }

        .iframe-container {
            flex: 1;
            background: #000;
            position: relative;
            overflow: hidden;
        }

        .browser-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #222;
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }

        .url-display {
            flex: 1;
            padding: 6px 12px;
            background: #111;
            border: 1px solid #333;
            border-radius: 4px;
            color: #666;
            font-size: 11px;
            font-family: monospace;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }


    </style>
</head>
<body>
    <div class="browser-container">
        <div class="header">
            <div class="title">COLE</div>
            <div class="search-container">
                <input type="text" 
                       class="search-input" 
                       id="searchInput" 
                       placeholder="Search or enter URL"
                       autocomplete="off">
                <button class="button" id="searchBtn">Search</button>
                <button class="button" id="homeBtn">Home</button>
            </div>
        </div>

        <div class="nav-buttons">
            <button class="nav-btn" id="backBtn">← Back</button>
            <button class="nav-btn" id="forwardBtn">Forward →</button>
            <button class="nav-btn" id="refreshBtn">↻ Refresh</button>
            <div class="url-display" id="urlDisplay">about:blank</div>
            <div class="quick-links">
                <a class="quick-link" data-url="https://www.tiktok.com">TikTok</a>
                <a class="quick-link" data-url="https://www.youtube.com">YouTube</a>
                <a class="quick-link" data-url="https://www.instagram.com">Instagram</a>
                <a class="quick-link" data-url="https://www.twitter.com">Twitter</a>
                <a class="quick-link" data-url="https://www.reddit.com">Reddit</a>
            </div>
        </div>

        <div class="iframe-container">
            <div class="loading-overlay hidden" id="loadingOverlay">
                <div class="loading-spinner"></div>
            </div>
            <iframe class="browser-frame" 
                    id="browserFrame" 
                    sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-popups-to-escape-sandbox"
                    src="about:blank">
            </iframe>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const homeBtn = document.getElementById('homeBtn');
        const backBtn = document.getElementById('backBtn');
        const forwardBtn = document.getElementById('forwardBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const browserFrame = document.getElementById('browserFrame');
        const urlDisplay = document.getElementById('urlDisplay');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const quickLinks = document.querySelectorAll('.quick-link');

        let history = [];
        let currentIndex = -1;
        const HOME_URL = 'https://duckduckgo.com';
        const USE_PROXY = true; // Set to true to use proxy for all sites

        // Proxy configuration - using a CORS proxy
        const PROXY_URL = 'https://api.allorigins.win/raw?url=';

        function isValidUrl(string) {
            try {
                new URL(string);
                return true;
            } catch (_) {
                return false;
            }
        }

        function getProxyUrl(url) {
            // Use proxy for all external sites to bypass CORS
            if (USE_PROXY && !url.startsWith('about:')) {
                return PROXY_URL + encodeURIComponent(url);
            }
            return url;
        }

        function navigateTo(url) {
            let targetUrl = url;

            // Check if it's a URL or search query
            if (!isValidUrl(url)) {
                // If not a valid URL, search on DuckDuckGo
                targetUrl = `https://duckduckgo.com/?q=${encodeURIComponent(url)}`;
            }

            // Add to history
            if (currentIndex < history.length - 1) {
                history = history.slice(0, currentIndex + 1);
            }
            history.push(targetUrl);
            currentIndex = history.length - 1;

            // Show loading
            loadingOverlay.classList.remove('hidden');

            // Load the URL with proxy
            const proxyUrl = getProxyUrl(targetUrl);
            browserFrame.src = proxyUrl;
            urlDisplay.textContent = targetUrl;

            updateNavButtons();
        }

        function updateNavButtons() {
            backBtn.disabled = currentIndex <= 0;
            forwardBtn.disabled = currentIndex >= history.length - 1;
            backBtn.style.opacity = currentIndex <= 0 ? '0.5' : '1';
            forwardBtn.style.opacity = currentIndex >= history.length - 1 ? '0.5' : '1';
        }

        // Event listeners
        searchBtn.addEventListener('click', () => {
            const query = searchInput.value.trim();
            if (query) {
                navigateTo(query);
            }
        });

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value.trim();
                if (query) {
                    navigateTo(query);
                }
            }
        });

        homeBtn.addEventListener('click', () => {
            searchInput.value = '';
            navigateTo(HOME_URL);
        });

        backBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                browserFrame.src = history[currentIndex];
                urlDisplay.textContent = history[currentIndex];
                updateNavButtons();
            }
        });

        forwardBtn.addEventListener('click', () => {
            if (currentIndex < history.length - 1) {
                currentIndex++;
                browserFrame.src = history[currentIndex];
                urlDisplay.textContent = history[currentIndex];
                updateNavButtons();
            }
        });

        refreshBtn.addEventListener('click', () => {
            loadingOverlay.classList.remove('hidden');
            browserFrame.src = browserFrame.src;
        });

        // Quick links
        quickLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const url = link.getAttribute('data-url');
                searchInput.value = url;
                navigateTo(url);
            });
        });

        // Hide loading overlay when iframe loads
        browserFrame.addEventListener('load', () => {
            loadingOverlay.classList.add('hidden');
        });

        // Prevent iframe from opening new tabs/windows
        browserFrame.addEventListener('load', () => {
            try {
                // Attempt to override window.open in the iframe
                if (browserFrame.contentWindow) {
                    browserFrame.contentWindow.open = function(url) {
                        navigateTo(url);
                        return null;
                    };
                }
            } catch (e) {
                // Cross-origin restrictions may prevent this
                console.log('Cannot override iframe window.open due to CORS');
            }
        });

        // Initialize with DuckDuckGo home
        navigateTo(HOME_URL);
        updateNavButtons();
    </script>
</body>
</html>
