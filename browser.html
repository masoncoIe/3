<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gothic Browser</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Garamond', serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0f0f0f 100%);
            color: #e0e0e0;
            overflow: hidden;
            height: 100vh;
        }

        .browser-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            border: 2px solid #4a0e4e;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.3);
        }

        .header {
            background: linear-gradient(180deg, #1a0a1f 0%, #2d1b3d 100%);
            padding: 15px;
            border-bottom: 3px solid #4a0e4e;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .title {
            text-align: center;
            font-size: 28px;
            color: #b19cd9;
            text-shadow: 0 0 10px #8a2be2, 0 0 20px #4a0e4e;
            font-weight: bold;
            letter-spacing: 3px;
            margin-bottom: 15px;
            font-family: 'Courier New', monospace;
        }

        .search-container {
            display: flex;
            gap: 10px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .search-input {
            flex: 1;
            padding: 12px 20px;
            background: #0d0d0d;
            border: 2px solid #4a0e4e;
            border-radius: 25px;
            color: #e0e0e0;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .search-input:focus {
            border-color: #8a2be2;
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.5), inset 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .search-input::placeholder {
            color: #666;
            font-style: italic;
        }

        .button {
            padding: 12px 25px;
            background: linear-gradient(180deg, #4a0e4e 0%, #2d1b3d 100%);
            border: 2px solid #8a2be2;
            border-radius: 25px;
            color: #e0e0e0;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(138, 43, 226, 0.5);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .button:hover {
            background: linear-gradient(180deg, #6a1e6e 0%, #4a0e4e 100%);
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.6), 0 4px 10px rgba(0, 0, 0, 0.3);
            transform: translateY(-2px);
        }

        .button:active {
            transform: translateY(0);
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
            padding: 10px 15px;
            background: #0d0d0d;
            border-bottom: 2px solid #4a0e4e;
        }

        .nav-btn {
            padding: 8px 15px;
            background: #1a0a1f;
            border: 1px solid #4a0e4e;
            border-radius: 5px;
            color: #b19cd9;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .nav-btn:hover {
            background: #2d1b3d;
            border-color: #8a2be2;
            box-shadow: 0 0 10px rgba(138, 43, 226, 0.4);
        }

        .quick-links {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .quick-link {
            padding: 6px 12px;
            background: linear-gradient(135deg, #2d1b3d 0%, #1a0a1f 100%);
            border: 1px solid #4a0e4e;
            border-radius: 15px;
            color: #b19cd9;
            text-decoration: none;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .quick-link:hover {
            background: linear-gradient(135deg, #4a0e4e 0%, #2d1b3d 100%);
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.5);
            transform: scale(1.05);
        }

        .iframe-container {
            flex: 1;
            background: #000;
            position: relative;
            overflow: hidden;
        }

        .browser-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid #2d1b3d;
            border-top: 5px solid #8a2be2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.5);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }

        .url-display {
            flex: 1;
            padding: 8px 15px;
            background: #0d0d0d;
            border: 1px solid #4a0e4e;
            border-radius: 5px;
            color: #888;
            font-size: 12px;
            font-family: monospace;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Gothic decorative elements */
        .header::before {
            content: '⚜';
            position: absolute;
            left: 20px;
            top: 20px;
            font-size: 24px;
            color: #4a0e4e;
            opacity: 0.5;
        }

        .header::after {
            content: '⚜';
            position: absolute;
            right: 20px;
            top: 20px;
            font-size: 24px;
            color: #4a0e4e;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="browser-container">
        <div class="header">
            <div class="title">⚔ GOTHIC BROWSER ⚔</div>
            <div class="search-container">
                <input type="text" 
                       class="search-input" 
                       id="searchInput" 
                       placeholder="Enter URL or search DuckDuckGo..."
                       autocomplete="off">
                <button class="button" id="searchBtn">Search</button>
                <button class="button" id="homeBtn">Home</button>
            </div>
        </div>

        <div class="nav-buttons">
            <button class="nav-btn" id="backBtn">← Back</button>
            <button class="nav-btn" id="forwardBtn">Forward →</button>
            <button class="nav-btn" id="refreshBtn">↻ Refresh</button>
            <div class="url-display" id="urlDisplay">about:blank</div>
            <div class="quick-links">
                <a class="quick-link" data-url="https://www.tiktok.com">TikTok</a>
                <a class="quick-link" data-url="https://www.youtube.com">YouTube</a>
                <a class="quick-link" data-url="https://www.instagram.com">Instagram</a>
                <a class="quick-link" data-url="https://www.twitter.com">Twitter</a>
                <a class="quick-link" data-url="https://www.reddit.com">Reddit</a>
            </div>
        </div>

        <div class="iframe-container">
            <div class="loading-overlay hidden" id="loadingOverlay">
                <div class="loading-spinner"></div>
            </div>
            <iframe class="browser-frame" 
                    id="browserFrame" 
                    sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-popups-to-escape-sandbox"
                    src="about:blank">
            </iframe>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const homeBtn = document.getElementById('homeBtn');
        const backBtn = document.getElementById('backBtn');
        const forwardBtn = document.getElementById('forwardBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const browserFrame = document.getElementById('browserFrame');
        const urlDisplay = document.getElementById('urlDisplay');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const quickLinks = document.querySelectorAll('.quick-link');

        let history = [];
        let currentIndex = -1;
        const HOME_URL = 'https://duckduckgo.com';

        // Proxy configuration - using a CORS proxy
        const PROXY_URL = 'https://api.allorigins.win/raw?url=';

        function isValidUrl(string) {
            try {
                new URL(string);
                return true;
            } catch (_) {
                return false;
            }
        }

        function getProxyUrl(url) {
            // For some sites, we'll try to load directly (they may work without proxy)
            // For others, we'll use the proxy
            if (url.includes('duckduckgo.com') || 
                url.includes('youtube.com') || 
                url.includes('tiktok.com')) {
                return url; // Try direct first
            }
            return PROXY_URL + encodeURIComponent(url);
        }

        function navigateTo(url) {
            let targetUrl = url;

            // Check if it's a URL or search query
            if (!isValidUrl(url)) {
                // If not a valid URL, search on DuckDuckGo
                targetUrl = `https://duckduckgo.com/?q=${encodeURIComponent(url)}`;
            }

            // Add to history
            if (currentIndex < history.length - 1) {
                history = history.slice(0, currentIndex + 1);
            }
            history.push(targetUrl);
            currentIndex = history.length - 1;

            // Show loading
            loadingOverlay.classList.remove('hidden');

            // Load the URL
            try {
                browserFrame.src = targetUrl;
                urlDisplay.textContent = targetUrl;
            } catch (e) {
                console.error('Navigation error:', e);
                browserFrame.src = getProxyUrl(targetUrl);
                urlDisplay.textContent = targetUrl + ' (via proxy)';
            }

            updateNavButtons();
        }

        function updateNavButtons() {
            backBtn.disabled = currentIndex <= 0;
            forwardBtn.disabled = currentIndex >= history.length - 1;
            backBtn.style.opacity = currentIndex <= 0 ? '0.5' : '1';
            forwardBtn.style.opacity = currentIndex >= history.length - 1 ? '0.5' : '1';
        }

        // Event listeners
        searchBtn.addEventListener('click', () => {
            const query = searchInput.value.trim();
            if (query) {
                navigateTo(query);
            }
        });

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value.trim();
                if (query) {
                    navigateTo(query);
                }
            }
        });

        homeBtn.addEventListener('click', () => {
            searchInput.value = '';
            navigateTo(HOME_URL);
        });

        backBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                browserFrame.src = history[currentIndex];
                urlDisplay.textContent = history[currentIndex];
                updateNavButtons();
            }
        });

        forwardBtn.addEventListener('click', () => {
            if (currentIndex < history.length - 1) {
                currentIndex++;
                browserFrame.src = history[currentIndex];
                urlDisplay.textContent = history[currentIndex];
                updateNavButtons();
            }
        });

        refreshBtn.addEventListener('click', () => {
            loadingOverlay.classList.remove('hidden');
            browserFrame.src = browserFrame.src;
        });

        // Quick links
        quickLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const url = link.getAttribute('data-url');
                searchInput.value = url;
                navigateTo(url);
            });
        });

        // Hide loading overlay when iframe loads
        browserFrame.addEventListener('load', () => {
            loadingOverlay.classList.add('hidden');
        });

        // Prevent iframe from opening new tabs/windows
        browserFrame.addEventListener('load', () => {
            try {
                // Attempt to override window.open in the iframe
                if (browserFrame.contentWindow) {
                    browserFrame.contentWindow.open = function(url) {
                        navigateTo(url);
                        return null;
                    };
                }
            } catch (e) {
                // Cross-origin restrictions may prevent this
                console.log('Cannot override iframe window.open due to CORS');
            }
        });

        // Initialize with DuckDuckGo home
        navigateTo(HOME_URL);
        updateNavButtons();
    </script>
</body>
</html>
