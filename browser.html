<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cole</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        .browser-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            background: #000;
            padding: 12px 20px;
            border-bottom: 1px solid #1a1a1a;
        }

        .title {
            text-align: center;
            font-size: 16px;
            color: #fff;
            font-weight: 400;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .search-container {
            display: flex;
            gap: 10px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .search-input {
            flex: 1;
            padding: 10px 16px;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        .search-input:focus {
            border-color: #2a2a2a;
            background: #0f0f0f;
        }

        .search-input::placeholder {
            color: #4a4a4a;
        }

        .button {
            padding: 10px 20px;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 6px;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 400;
        }

        .button:hover {
            background: #1a1a1a;
            border-color: #2a2a2a;
        }

        .button:active {
            background: #333;
        }

        .nav-buttons {
            display: flex;
            gap: 8px;
            padding: 8px 20px;
            background: #000;
            border-bottom: 1px solid #1a1a1a;
            align-items: center;
        }

        .nav-btn {
            padding: 6px 12px;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 12px;
        }

        .nav-btn:hover {
            background: #1a1a1a;
            border-color: #2a2a2a;
        }

        .quick-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            margin-left: auto;
        }

        .quick-link {
            padding: 6px 12px;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 6px;
            color: #fff;
            text-decoration: none;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-block;
        }

        .quick-link:hover {
            background: #1a1a1a;
            border-color: #2a2a2a;
        }

        .iframe-container {
            flex: 1;
            background: #000;
            position: relative;
            overflow: hidden;
        }

        .browser-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 2px solid #1a1a1a;
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }

        .url-display {
            flex: 1;
            padding: 6px 12px;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 6px;
            color: #4a4a4a;
            font-size: 11px;
            font-family: 'SF Mono', Monaco, 'Courier New', monospace;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }


    </style>
</head>
<body>
    <div class="browser-container">
        <div class="header">
            <div class="title">COLE</div>
            <div class="search-container">
                <input type="text" 
                       class="search-input" 
                       id="searchInput" 
                       placeholder="Search or enter URL"
                       autocomplete="off">
                <button class="button" id="searchBtn">Search</button>
                <button class="button" id="homeBtn">Home</button>
            </div>
        </div>

        <div class="nav-buttons">
            <button class="nav-btn" id="backBtn">← Back</button>
            <button class="nav-btn" id="forwardBtn">Forward →</button>
            <button class="nav-btn" id="refreshBtn">↻ Refresh</button>
            <div class="url-display" id="urlDisplay">about:blank</div>
            <div class="quick-links">
                <a class="quick-link" data-url="https://www.tiktok.com">TikTok</a>
                <a class="quick-link" data-url="https://www.youtube.com">YouTube</a>
                <a class="quick-link" data-url="https://www.instagram.com">Instagram</a>
                <a class="quick-link" data-url="https://www.twitter.com">Twitter</a>
                <a class="quick-link" data-url="https://www.reddit.com">Reddit</a>
            </div>
        </div>

        <div class="iframe-container">
            <div class="loading-overlay hidden" id="loadingOverlay">
                <div class="loading-spinner"></div>
            </div>
            <iframe class="browser-frame" 
                    id="browserFrame" 
                    sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-popups-to-escape-sandbox"
                    src="about:blank">
            </iframe>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const homeBtn = document.getElementById('homeBtn');
        const backBtn = document.getElementById('backBtn');
        const forwardBtn = document.getElementById('forwardBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const browserFrame = document.getElementById('browserFrame');
        const urlDisplay = document.getElementById('urlDisplay');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const quickLinks = document.querySelectorAll('.quick-link');

        let history = [];
        let currentIndex = -1;
        
        // Create a custom home page instead of loading external site
        const HOME_HTML = `
            <!DOCTYPE html>
            <html>
            <head>
                <style>
                    body {
                        margin: 0;
                        padding: 0;
                        background: #000;
                        color: #fff;
                        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
                        display: flex;
                        justify-content: center;
                        align-items: center;
                        height: 100vh;
                        flex-direction: column;
                    }
                    h1 {
                        font-size: 48px;
                        font-weight: 300;
                        letter-spacing: 4px;
                        margin-bottom: 20px;
                    }
                    p {
                        font-size: 14px;
                        color: #4a4a4a;
                        letter-spacing: 1px;
                    }
                </style>
            </head>
            <body>
                <h1>COLE</h1>
                <p>Enter a search or URL above</p>
            </body>
            </html>
        `;
        
        const USE_PROXY = false; // Disabled proxy - load sites directly

        function isValidUrl(string) {
            try {
                new URL(string);
                return true;
            } catch (_) {
                return false;
            }
        }

        function getProxyUrl(url) {
            // Load sites directly without proxy
            return url;
        }

        function navigateTo(url) {
            let targetUrl = url;

            // Check if it's a URL or search query
            if (!isValidUrl(url)) {
                // If not a valid URL, search on DuckDuckGo
                targetUrl = `https://duckduckgo.com/?q=${encodeURIComponent(url)}`;
            }

            // Add to history
            if (currentIndex < history.length - 1) {
                history = history.slice(0, currentIndex + 1);
            }
            history.push(targetUrl);
            currentIndex = history.length - 1;

            // Show loading
            loadingOverlay.classList.remove('hidden');

            // Load the URL with proxy
            const proxyUrl = getProxyUrl(targetUrl);
            browserFrame.src = proxyUrl;
            urlDisplay.textContent = targetUrl;

            updateNavButtons();
        }

        function updateNavButtons() {
            backBtn.disabled = currentIndex <= 0;
            forwardBtn.disabled = currentIndex >= history.length - 1;
            backBtn.style.opacity = currentIndex <= 0 ? '0.5' : '1';
            forwardBtn.style.opacity = currentIndex >= history.length - 1 ? '0.5' : '1';
        }

        // Event listeners
        searchBtn.addEventListener('click', () => {
            const query = searchInput.value.trim();
            if (query) {
                navigateTo(query);
            }
        });

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value.trim();
                if (query) {
                    navigateTo(query);
                }
            }
        });

        homeBtn.addEventListener('click', () => {
            searchInput.value = '';
            loadHomePage();
        });
        
        function loadHomePage() {
            history = [];
            currentIndex = -1;
            browserFrame.srcdoc = HOME_HTML;
            urlDisplay.textContent = 'home';
            loadingOverlay.classList.add('hidden');
            updateNavButtons();
        }

        backBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                browserFrame.src = history[currentIndex];
                urlDisplay.textContent = history[currentIndex];
                updateNavButtons();
            }
        });

        forwardBtn.addEventListener('click', () => {
            if (currentIndex < history.length - 1) {
                currentIndex++;
                browserFrame.src = history[currentIndex];
                urlDisplay.textContent = history[currentIndex];
                updateNavButtons();
            }
        });

        refreshBtn.addEventListener('click', () => {
            loadingOverlay.classList.remove('hidden');
            browserFrame.src = browserFrame.src;
        });

        // Quick links
        quickLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const url = link.getAttribute('data-url');
                searchInput.value = url;
                navigateTo(url);
            });
        });

        // Hide loading overlay when iframe loads
        browserFrame.addEventListener('load', () => {
            loadingOverlay.classList.add('hidden');
        });

        // Prevent iframe from opening new tabs/windows
        browserFrame.addEventListener('load', () => {
            try {
                // Attempt to override window.open in the iframe
                if (browserFrame.contentWindow) {
                    browserFrame.contentWindow.open = function(url) {
                        navigateTo(url);
                        return null;
                    };
                }
            } catch (e) {
                // Cross-origin restrictions may prevent this
                console.log('Cannot override iframe window.open due to CORS');
            }
        });

        // Initialize with custom home page
        loadHomePage();
    </script>
</body>
</html>
