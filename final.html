<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cole</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:wght@300;400&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            background: #000 url('background.avif') center/cover no-repeat fixed;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: -1;
        }

        .browser-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-bottom: 1px solid #2a2a2a;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.8);
            z-index: 1000;
            transform: translateY(-100%);
            transition: transform 0.3s ease;
        }
        
        .header.visible {
            transform: translateY(0);
        }
        
        .header.home-mode {
            position: static;
            transform: none;
            background: transparent;
            border: none;
            box-shadow: none;
            padding: 0;
        }

        .title {
            text-align: center;
            font-size: 20px;
            color: #fff;
            font-weight: 600;
            letter-spacing: 6px;
            margin-bottom: 12px;
            font-family: 'Cinzel', serif;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
            cursor: pointer;
            user-select: none;
        }
        
        .home-mode .title {
            font-size: 96px;
            letter-spacing: 16px;
            margin-bottom: 40px;
        }

        .title:hover {
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.2);
        }

        .search-container {
            display: flex;
            gap: 0;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .home-mode .search-container {
            max-width: 800px;
        }

        .search-input {
            flex: 1;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #2a2a2a;
            border-right: none;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Cormorant Garamond', serif;
            letter-spacing: 0.5px;
        }
        
        .home-mode .search-input {
            padding: 18px 28px;
            font-size: 16px;
        }

        .search-input:focus {
            border-color: #3a3a3a;
            background: rgba(5, 5, 5, 0.9);
            box-shadow: inset 0 1px 10px rgba(0, 0, 0, 0.5);
        }

        .search-input::placeholder {
            color: #4a4a4a;
            font-style: italic;
        }

        .button {
            padding: 12px 24px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #2a2a2a;
            color: #fff;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cinzel', serif;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 500;
        }
        
        .home-mode .button {
            padding: 18px 36px;
            font-size: 13px;
        }

        .button:hover {
            background: rgba(10, 10, 10, 0.95);
            border-color: #3a3a3a;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 20px;
            gap: 15px;
        }

        .url-display {
            flex: 1;
            padding: 8px 16px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #1a1a1a;
            border-radius: 4px;
            color: #888;
            font-size: 12px;
            font-family: 'Cormorant Garamond', serif;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            letter-spacing: 0.5px;
        }
        
        .nav-controls {
            display: flex;
            gap: 8px;
        }
        
        .nav-btn {
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            color: #fff;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Cinzel', serif;
            letter-spacing: 1px;
        }
        
        .nav-btn:hover {
            background: rgba(20, 20, 20, 0.9);
            border-color: #3a3a3a;
        }
        
        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        .toggle-controls {
            position: fixed;
            top: 70px;
            right: 20px;
            padding: 8px 16px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            color: #fff;
            font-size: 11px;
            cursor: pointer;
            z-index: 999;
            transition: all 0.3s ease;
            font-family: 'Cinzel', serif;
            letter-spacing: 1px;
            opacity: 0;
            pointer-events: none;
        }
        
        .toggle-controls.visible {
            opacity: 1;
            pointer-events: auto;
        }
        
        .toggle-controls:hover {
            background: rgba(20, 20, 20, 0.9);
            border-color: #3a3a3a;
        }

        .iframe-container {
            flex: 1;
            background: #000;
            position: relative;
            overflow: hidden;
        }

        .browser-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
            display: block;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            flex-direction: column;
            gap: 20px;
        }

        .loading-overlay.hidden {
            display: none;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 2px solid #1a1a1a;
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            color: #4a4a4a;
            font-size: 14px;
            font-family: 'Cinzel', serif;
            letter-spacing: 2px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .home-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: transparent;
            z-index: 100;
        }

        .home-screen.hidden {
            display: none;
        }

        .home-search-wrapper {
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="browser-container">
        <div class="header home-mode" id="header">
            <div class="title" id="titleElement" title="Click to return home">C O L E</div>
            <div class="search-container">
                <input type="text" 
                       class="search-input" 
                       id="searchInput" 
                       placeholder="Enter destination..."
                       autocomplete="off">
                <button class="button" id="searchBtn">Enter</button>
            </div>
            <div class="nav-bar" id="navBar">
                <div class="nav-controls">
                    <button class="nav-btn" id="backBtn">← Back</button>
                    <button class="nav-btn" id="forwardBtn">Forward →</button>
                    <button class="nav-btn" id="refreshBtn">↻ Refresh</button>
                    <button class="nav-btn" id="homeBtn">⌂ Home</button>
                </div>
                <div class="url-display" id="urlDisplay">—</div>
            </div>
        </div>
        
        <button class="toggle-controls" id="toggleBtn">▼ Show Controls</button>

        <div class="iframe-container">
            <div class="loading-overlay hidden" id="loadingOverlay">
                <div class="loading-spinner"></div>
                <div class="loading-text">LOADING</div>
            </div>
            <div class="home-screen" id="homeScreen">
            </div>
            <iframe class="browser-frame" 
                    id="browserFrame"
                    name="content"
                    src="about:blank">
            </iframe>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const browserFrame = document.getElementById('browserFrame');
        const homeScreen = document.getElementById('homeScreen');
        const urlDisplay = document.getElementById('urlDisplay');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const titleElement = document.getElementById('titleElement');
        const header = document.getElementById('header');
        const navBar = document.getElementById('navBar');
        const toggleBtn = document.getElementById('toggleBtn');
        const homeBtn = document.getElementById('homeBtn');
        const backBtn = document.getElementById('backBtn');
        const forwardBtn = document.getElementById('forwardBtn');
        const refreshBtn = document.getElementById('refreshBtn');

        let isNavigating = false;
        let history = [];
        let currentIndex = -1;
        let controlsVisible = true;

        function isValidUrl(string) {
            try {
                const url = new URL(string);
                return url.protocol === 'http:' || url.protocol === 'https:';
            } catch (_) {
                return false;
            }
        }

        function formatUrl(input) {
            input = input.trim();
            
            if (!input) return null;
            
            if (isValidUrl(input)) {
                return input;
            }
            
            // Check if it looks like a domain
            if (input.includes('.') && !input.includes(' ')) {
                return 'https://' + input;
            }
            
            // Otherwise treat as search query
            return 'https://duckduckgo.com/?q=' + encodeURIComponent(input);
        }

        function navigateTo(url) {
            if (isNavigating) return;
            
            const targetUrl = formatUrl(url);
            if (!targetUrl) return;
            
            isNavigating = true;
            console.log('[Cole] Navigating to:', targetUrl);
            
            // Add to history
            if (currentIndex < history.length - 1) {
                history = history.slice(0, currentIndex + 1);
            }
            history.push(targetUrl);
            currentIndex = history.length - 1;
            updateNavButtons();
            
            // Switch to browse mode
            homeScreen.classList.add('hidden');
            header.classList.remove('home-mode');
            header.classList.add('visible');
            toggleBtn.classList.add('visible');
            
            // Show loading
            loadingOverlay.classList.remove('hidden');
            
            // Update URL display
            try {
                const urlObj = new URL(targetUrl);
                urlDisplay.textContent = urlObj.hostname.replace('www.', '');
            } catch (e) {
                urlDisplay.textContent = targetUrl;
            }

            // Set iframe src
            browserFrame.src = targetUrl;
            
            // Timeout to hide loading if it takes too long
            setTimeout(() => {
                loadingOverlay.classList.add('hidden');
                isNavigating = false;
            }, 5000);
        }

        function loadHomePage() {
            console.log('[Cole] Loading home page');
            isNavigating = false;
            history = [];
            currentIndex = -1;
            homeScreen.classList.remove('hidden');
            header.classList.add('home-mode');
            header.classList.remove('visible');
            toggleBtn.classList.remove('visible');
            browserFrame.src = 'about:blank';
            urlDisplay.textContent = '—';
            loadingOverlay.classList.add('hidden');
            searchInput.value = '';
            updateNavButtons();
        }
        
        function updateNavButtons() {
            backBtn.disabled = currentIndex <= 0;
            forwardBtn.disabled = currentIndex >= history.length - 1;
        }
        
        function toggleControls() {
            controlsVisible = !controlsVisible;
            if (controlsVisible) {
                header.classList.add('visible');
                toggleBtn.textContent = '▼ Hide Controls';
            } else {
                header.classList.remove('visible');
                toggleBtn.textContent = '▲ Show Controls';
            }
        }

        // Event listeners
        searchBtn.addEventListener('click', () => {
            const query = searchInput.value.trim();
            if (query) {
                navigateTo(query);
            }
        });

        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                const query = searchInput.value.trim();
                if (query) {
                    navigateTo(query);
                }
            }
        });

        // Navigation controls
        homeBtn.addEventListener('click', () => {
            loadHomePage();
        });
        
        backBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                loadingOverlay.classList.remove('hidden');
                browserFrame.src = history[currentIndex];
                try {
                    const urlObj = new URL(history[currentIndex]);
                    urlDisplay.textContent = urlObj.hostname.replace('www.', '');
                } catch (e) {
                    urlDisplay.textContent = history[currentIndex];
                }
                updateNavButtons();
            }
        });
        
        forwardBtn.addEventListener('click', () => {
            if (currentIndex < history.length - 1) {
                currentIndex++;
                loadingOverlay.classList.remove('hidden');
                browserFrame.src = history[currentIndex];
                try {
                    const urlObj = new URL(history[currentIndex]);
                    urlDisplay.textContent = urlObj.hostname.replace('www.', '');
                } catch (e) {
                    urlDisplay.textContent = history[currentIndex];
                }
                updateNavButtons();
            }
        });
        
        refreshBtn.addEventListener('click', () => {
            loadingOverlay.classList.remove('hidden');
            browserFrame.src = browserFrame.src;
        });
        
        toggleBtn.addEventListener('click', () => {
            toggleControls();
        });
        
        // Click title to go home
        titleElement.addEventListener('click', () => {
            loadHomePage();
        });

        // ESC key to go home
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                loadHomePage();
            }
        });

        // Hide loading when iframe loads
        browserFrame.addEventListener('load', () => {
            const src = browserFrame.src;
            console.log('[Cole] Iframe loaded:', src);
            
            if (src && src !== 'about:blank') {
                setTimeout(() => {
                    loadingOverlay.classList.add('hidden');
                    isNavigating = false;
                }, 800);
            }
        });

        // Initialize
        loadHomePage();
        
        console.log('[Cole] Browser initialized');
        console.log('[Cole] Background image: background.avif');
        
        // Test navigation after 2 seconds if user types test
        searchInput.addEventListener('input', (e) => {
            if (e.target.value.toLowerCase() === 'test') {
                console.log('[Cole] Test mode - try entering: example.com');
            }
        });
    </script>
</body>
</html>
