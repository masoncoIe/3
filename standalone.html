<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cole</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        .browser-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            background: #000;
            padding: 12px 20px;
            border-bottom: 1px solid #1a1a1a;
        }

        .title {
            text-align: center;
            font-size: 16px;
            color: #fff;
            font-weight: 400;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .search-container {
            display: flex;
            gap: 10px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .search-input {
            flex: 1;
            padding: 10px 16px;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        .search-input:focus {
            border-color: #2a2a2a;
            background: #0f0f0f;
        }

        .search-input::placeholder {
            color: #4a4a4a;
        }

        .button {
            padding: 10px 20px;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 6px;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 400;
        }

        .button:hover {
            background: #1a1a1a;
            border-color: #2a2a2a;
        }

        .button:active {
            background: #333;
        }

        .nav-buttons {
            display: flex;
            gap: 8px;
            padding: 8px 20px;
            background: #000;
            border-bottom: 1px solid #1a1a1a;
            align-items: center;
        }

        .nav-btn {
            padding: 6px 12px;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 12px;
        }

        .nav-btn:hover {
            background: #1a1a1a;
            border-color: #2a2a2a;
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .quick-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            margin-left: auto;
        }

        .quick-link {
            padding: 6px 12px;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 6px;
            color: #fff;
            text-decoration: none;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-block;
        }

        .quick-link:hover {
            background: #1a1a1a;
            border-color: #2a2a2a;
        }

        .iframe-container {
            flex: 1;
            background: #000;
            position: relative;
            overflow: hidden;
        }

        .browser-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            flex-direction: column;
            gap: 20px;
        }

        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 2px solid #1a1a1a;
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading-text {
            color: #4a4a4a;
            font-size: 12px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }

        .url-display {
            flex: 1;
            padding: 6px 12px;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 6px;
            color: #4a4a4a;
            font-size: 11px;
            font-family: 'SF Mono', Monaco, 'Courier New', monospace;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .home-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            flex-direction: column;
            background: #000;
        }

        .home-screen h1 {
            font-size: 48px;
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 20px;
        }

        .home-screen p {
            font-size: 14px;
            color: #4a4a4a;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }

        .tech-stack {
            display: flex;
            gap: 15px;
            font-size: 11px;
            color: #2a2a2a;
        }

        .tech-stack span {
            padding: 4px 8px;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="browser-container">
        <div class="header">
            <div class="title">COLE</div>
            <div class="search-container">
                <input type="text" 
                       class="search-input" 
                       id="searchInput" 
                       placeholder="Search or enter URL"
                       autocomplete="off">
                <button class="button" id="searchBtn">Go</button>
                <button class="button" id="homeBtn">Home</button>
            </div>
        </div>

        <div class="nav-buttons">
            <button class="nav-btn" id="backBtn">← Back</button>
            <button class="nav-btn" id="forwardBtn">Forward →</button>
            <button class="nav-btn" id="refreshBtn">↻ Refresh</button>
            <div class="url-display" id="urlDisplay">home</div>
            <div class="quick-links">
                <a class="quick-link" data-url="https://www.tiktok.com">TikTok</a>
                <a class="quick-link" data-url="https://www.youtube.com">YouTube</a>
                <a class="quick-link" data-url="https://www.instagram.com">Instagram</a>
                <a class="quick-link" data-url="https://twitter.com">Twitter</a>
                <a class="quick-link" data-url="https://www.reddit.com">Reddit</a>
            </div>
        </div>

        <div class="iframe-container">
            <div class="loading-overlay hidden" id="loadingOverlay">
                <div class="loading-spinner"></div>
                <div class="loading-text">Loading...</div>
            </div>
            <div class="home-screen" id="homeScreen">
                <h1>COLE</h1>
                <p>Enter a search or URL above</p>
                <div class="tech-stack">
                    <span>Ultraviolet</span>
                    <span>Scramjet</span>
                    <span>Epoxy</span>
                    <span>WISP</span>
                </div>
            </div>
            <iframe class="browser-frame hidden" 
                    id="browserFrame"
                    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"
                    src="about:blank">
            </iframe>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const homeBtn = document.getElementById('homeBtn');
        const backBtn = document.getElementById('backBtn');
        const forwardBtn = document.getElementById('forwardBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const browserFrame = document.getElementById('browserFrame');
        const homeScreen = document.getElementById('homeScreen');
        const urlDisplay = document.getElementById('urlDisplay');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const quickLinks = document.querySelectorAll('.quick-link');

        let history = [];
        let currentIndex = -1;

        // Use Rammerhead or other public proxies as fallback
        const PROXY_SERVERS = [
            'https://rammerhead.org/',
            'https://holyubofficial.net/',
        ];

        function isValidUrl(string) {
            try {
                const url = new URL(string);
                return url.protocol === 'http:' || url.protocol === 'https:';
            } catch (_) {
                return false;
            }
        }

        function formatUrl(input) {
            if (isValidUrl(input)) {
                return input;
            }
            
            // Check if it looks like a domain
            if (input.includes('.') && !input.includes(' ')) {
                return 'https://' + input;
            }
            
            // Otherwise treat as search query
            return 'https://duckduckgo.com/?q=' + encodeURIComponent(input);
        }

        function getProxyUrl(targetUrl) {
            // Try to use a public proxy service
            // Note: In production, you'd want to set up your own Ultraviolet instance
            return targetUrl; // Direct loading (may be blocked by CORS)
        }

        async function navigateTo(url) {
            const targetUrl = formatUrl(url);
            
            // Add to history
            if (currentIndex < history.length - 1) {
                history = history.slice(0, currentIndex + 1);
            }
            history.push(targetUrl);
            currentIndex = history.length - 1;

            // Show loading
            loadingOverlay.classList.remove('hidden');
            homeScreen.classList.add('hidden');
            browserFrame.classList.remove('hidden');

            const proxyUrl = getProxyUrl(targetUrl);
            browserFrame.src = proxyUrl;
            urlDisplay.textContent = targetUrl;
            updateNavButtons();
        }

        function loadHomePage() {
            history = [];
            currentIndex = -1;
            homeScreen.classList.remove('hidden');
            browserFrame.classList.add('hidden');
            browserFrame.src = 'about:blank';
            urlDisplay.textContent = 'home';
            loadingOverlay.classList.add('hidden');
            updateNavButtons();
        }

        function updateNavButtons() {
            backBtn.disabled = currentIndex <= 0;
            forwardBtn.disabled = currentIndex >= history.length - 1;
        }

        // Event listeners
        searchBtn.addEventListener('click', () => {
            const query = searchInput.value.trim();
            if (query) {
                navigateTo(query);
            }
        });

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value.trim();
                if (query) {
                    navigateTo(query);
                }
            }
        });

        homeBtn.addEventListener('click', () => {
            searchInput.value = '';
            loadHomePage();
        });

        backBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                loadingOverlay.classList.remove('hidden');
                browserFrame.src = history[currentIndex];
                urlDisplay.textContent = history[currentIndex];
                updateNavButtons();
            }
        });

        forwardBtn.addEventListener('click', () => {
            if (currentIndex < history.length - 1) {
                currentIndex++;
                loadingOverlay.classList.remove('hidden');
                browserFrame.src = history[currentIndex];
                urlDisplay.textContent = history[currentIndex];
                updateNavButtons();
            }
        });

        refreshBtn.addEventListener('click', () => {
            if (!homeScreen.classList.contains('hidden')) {
                loadHomePage();
            } else {
                loadingOverlay.classList.remove('hidden');
                browserFrame.src = browserFrame.src;
            }
        });

        // Quick links
        quickLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const url = link.getAttribute('data-url');
                searchInput.value = url;
                navigateTo(url);
            });
        });

        // Hide loading overlay when iframe loads
        browserFrame.addEventListener('load', () => {
            setTimeout(() => {
                loadingOverlay.classList.add('hidden');
            }, 500);
        });

        // Initialize
        loadHomePage();
    </script>
</body>
</html>
